version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: warface_db
      POSTGRES_USER: warface_user
      POSTGRES_PASSWORD: warface_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    restart: always

  backend:
    build: ./backend
    environment:
      DEBUG: "False"
      DATABASE_URL: postgres://warface_user:warface_password@db:5432/warface_db
      CELERY_BROKER_URL: redis://redis:6379/0
      ALLOWED_HOSTS: warbanner.italommf.com.br,localhost,backend
    volumes:
      - ./backend/imagens:/app/imagens
      - ./backend/music:/app/music
    depends_on:
      - db
      - redis
    ports:
      - "8001:8000"
    restart: always

  worker:
    build: ./backend
    command: celery -A warface worker --loglevel=info -P solo
    environment:
      DATABASE_URL: postgres://warface_user:warface_password@db:5432/warface_db
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ./backend/imagens:/app/imagens
      - ./backend/music:/app/music
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
